<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADT | Student Survey</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="survey-page">
    <header class="top-nav">
        <a href="/" class="pill-btn">← Back</a>
    </header>
    <main class="survey-container">
        <form action="/run-simulation" method="POST">
            <h1>Initialize Your Twin</h1>
            
            <fieldset>
                <legend>1. Academic Profile</legend>
                <div class="form-group">
                    <label>Student Name</label>
                    <input type="text" name="student_name" placeholder="Alex Knight" required>
                </div>
                <div class="form-group">
                    <label>Current Cumulative GPA</label>
                    <input type="number" name="gpa" step="0.01" min="0" max="4" required>
                </div>
                <div class="form-group">
                    <label>Failed Courses (Historical)</label>
                    <input type="number" name="failed" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Retaking any courses?</label>
                    <div class="toggle-group">
                        <input type="radio" name="retake" value="1"> Yes
                        <input type="radio" name="retake" value="0" checked> No
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Daily Variables</legend>
                <div class="form-group">
                    <label>Sleep (h/night): <span id="s-val">7</span></label>
                    <input type="range" name="sleep" min="3" max="10" step="0.5" value="7" oninput="document.getElementById('s-val').innerText = this.value">
                </div>
                <div class="form-group">
                    <label>Stress Level (1-10): <span id="st-val">5</span></label>
                    <input type="range" name="stress" min="1" max="10" value="5" oninput="document.getElementById('st-val').innerText = this.value">
                </div>
            </fieldset>

            <fieldset>
                <legend>3. External Load</legend>
                <div class="form-group">
                    <label>Work Hours per Week</label>
                    <input type="number" name="work_hours" value="0">
                </div>
                <div class="form-group">
                    <label>Semester Difficulty (1-5)</label>
                    <input type="number" name="difficulty" min="1" max="5" value="3">
                </div>
                <div class="form-group">
                    <label>Extracurricular (Hours/Week)</label>
                    <input type="number" name="extra" value="0">
                </div>
            </fieldset>

            <button type="submit" class="cta-btn">Run Simulation</button>
        </form>
    </main>
</body>
</html>
