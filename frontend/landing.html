<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Digital Twin | Home</title>
    <style>
        :root { 
            --ucf-gold: #ffcc00; 
            --ucf-bg: #fdfae7; 
        }
        
        body { 
            background-color: var(--ucf-bg); 
            /* Clean sans-serif font to match the rest of your application */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333; 
            margin: 0; 
            overflow: hidden;
        }
        
        .logo-top-left { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            width: 100px; 
            z-index: 1000;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center; 
            padding: 0 15%; 
        }
        
        h1 { 
            font-size: 3.5rem; 
            color: #000; 
            margin-bottom: 20px; 
            letter-spacing: -1px;
            font-weight: 800;
        }

        #typewriter { 
            font-size: 1.4rem; 
            line-height: 1.6; 
            min-height: 120px; 
            color: #444; 
            max-width: 850px;
            font-weight: 500; 
        }
        
        .start-btn { 
            margin-top: 40px; 
            padding: 18px 45px; 
            background: #000; 
            color: var(--ucf-gold); 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            opacity: 0; 
            transition: transform 0.3s ease, background 0.3s ease;
            animation: fadeIn 1s forwards 5s; /* Button appears after typing finishes */
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #222;
        }

        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='pegasus.png') }}" class="logo-top-left" alt="UCF Pegasus">

    <div class="container">
        <h1> <strong>Digital Twin</strong></h1>
        <div id="typewriter"></div>
        <a href="/simulator" class="start-btn">INITIALIZE SIMULATION</a>
    </div>

    <script>
        const text = "Welcome to the future of academic planning. Our Digital Twin leverages your data to simulate semester outcomes in seconds. Identify risks, optimize your GPA, and protect your mental well-being with precision. Go Knights, Charge On!";
        
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                // 30ms provides a smooth, professional reading pace
                setTimeout(typeWriter, 30); 
            }
        }

        // Starts the simulation once the page loads
        window.onload = typeWriter;
    </script>
</body>
</html>
